name: Graph Generation and Validation

on:
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0' # Weekly run on Sunday midnight
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl-fis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run FIS crawler
        run: uv run scrapy crawl dataservice -L INFO

      - name: Upload FIS Export
        uses: actions/upload-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
          retention-days: 1


  crawl-euris:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run EURIS crawler
        run: uv run scrapy crawl euris -L INFO

      - name: Upload EURIS Export
        uses: actions/upload-artifact@v4
        with:
          name: euris-export
          path: output/euris-export/
          retention-days: 1


  crawl-disk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run DISK crawler
        run: uv run scrapy crawl disk -L INFO

      - name: Upload DISK Export
        uses: actions/upload-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
          retention-days: 1


  build-fis-graph:
    needs: [crawl-fis]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Build FIS Graph

        run: uv run python -m fis.cli graph fis
      - name: Enrich FIS Graph
        run: uv run python -m fis.cli graph enrich-fis
      - name: Upload FIS Graph
        uses: actions/upload-artifact@v4
        with:
          name: fis-graph
          path: output/fis-graph/
          retention-days: 7
      - name: Upload FIS Enriched
        uses: actions/upload-artifact@v4
        with:
          name: fis-enriched
          path: output/fis-enriched/
          retention-days: 7

  build-euris-graph:
    needs: [crawl-euris]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download EURIS Export
        uses: actions/download-artifact@v4
        with:
          name: euris-export
          path: output/euris-export/
      - name: Build EURIS Graph
        run: uv run python -m fis.cli graph euris
      - name: Enrich EURIS Graph
        run: uv run python -m fis.cli graph enrich-euris
      - name: Upload EURIS Graph
        uses: actions/upload-artifact@v4
        with:
          name: euris-graph
          path: output/euris-graph/
          retention-days: 7
      - name: Upload EURIS Enriched
        uses: actions/upload-artifact@v4
        with:
          name: euris-enriched
          path: output/euris-enriched/
          retention-days: 7

  merge-graphs:
    needs: [build-fis-graph, build-euris-graph]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Enriched
        uses: actions/download-artifact@v4
        with:
          name: fis-enriched
          path: output/fis-enriched/
      - name: Download EURIS Enriched
        uses: actions/download-artifact@v4
        with:
          name: euris-enriched
          path: output/euris-enriched/
      - name: Merge Graphs
        run: uv run python -m fis.cli graph merge
      - name: Upload Merged Graph
        uses: actions/upload-artifact@v4
        with:
          name: merged-graph
          path: output/merged-graph/
          retention-days: 30

  schematize-lock:
    needs: [crawl-fis, crawl-disk, build-fis-graph]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Download DISK Export
        uses: actions/download-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
      - name: Download FIS Graph
        uses: actions/download-artifact@v4
        with:
          name: fis-graph
          path: output/fis-graph/
      - name: Run Lock Schematization
        run: uv run python -m fis.cli lock schematize --fis-graph output/fis-graph/graph.pickle
      - name: Upload Lock Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lock-schematization
          path: output/lock-schematization/
          retention-days: 30

  schematize-bridge:
    needs: [crawl-fis, crawl-disk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Download DISK Export
        uses: actions/download-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
      - name: Run Bridge Schematization
        run: uv run python -m fis.cli bridge schematize
      - name: Upload Bridge Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-schematization
          path: output/bridge-schematization/
          retention-days: 30

  schematize-dropins-simplified:
    needs: [crawl-fis, crawl-disk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Download DISK Export
        uses: actions/download-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
      - name: Run Integrated Dropins Schematization (Simplified)
        run: uv run python -m fis.cli dropins schematize --mode simplified --output-dir output/dropins-schematization-simplified
      - name: Upload Dropins Simplified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integrated-schematization-simplified
          path: output/dropins-schematization-simplified/
          retention-days: 30

  schematize-dropins-detailed:
    needs: [crawl-fis, crawl-disk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Download DISK Export
        uses: actions/download-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
      - name: Run Integrated Dropins Schematization (Detailed)
        run: uv run python -m fis.cli dropins schematize --mode detailed --output-dir output/dropins-schematization-detailed
      - name: Upload Dropins Detailed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integrated-schematization-detailed
          path: output/dropins-schematization-detailed/
          retention-days: 30

  schematize-dropins-berths:
    needs: [crawl-fis, crawl-disk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Export
        uses: actions/download-artifact@v4
        with:
          name: fis-export
          path: output/fis-export/
      - name: Download DISK Export
        uses: actions/download-artifact@v4
        with:
          name: disk-export
          path: output/disk-export/
      - name: Run Integrated Dropins Schematization with Berths
        run: >
          uv run python -m fis.cli dropins schematize
          --include-berths
          --output-dir output/integrated-schematization-with-berths
      - name: Upload Dropins Berths Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integrated-schematization-with-berths
          path: output/integrated-schematization-with-berths/
          retention-days: 30

  validate-fis:
    needs: [build-fis-graph]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Enriched
        uses: actions/download-artifact@v4
        with:
          name: fis-enriched
          path: output/fis-enriched/
      - name: Generate FIS Validation Report
        run: >
          uv run python -m fis.cli graph validate
          --graph output/fis-enriched/graph.pickle
          --schema config/schema.toml
          --output-file output/fis_validation_report.md
      - name: Upload FIS Report
        uses: actions/upload-artifact@v4
        with:
          name: fis-validation-report
          path: output/fis_validation_report.md
          retention-days: 30

  validate-merged:
    needs: [merge-graphs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download Merged Graph
        uses: actions/download-artifact@v4
        with:
          name: merged-graph
          path: output/merged-graph/
      - name: Generate Merged Validation Report
        run: >
          uv run python -m fis.cli graph validate
          --graph output/merged-graph/graph.pickle
          --schema config/schema.toml
          --output-file output/merged_validation_report.md
      - name: Upload Merged Report
        uses: actions/upload-artifact@v4
        with:
          name: merged-validation-report
          path: output/merged_validation_report.md
          retention-days: 30

  validate-bivas:
    needs: [build-fis-graph]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download FIS Enriched
        uses: actions/download-artifact@v4
        with:
          name: fis-enriched
          path: output/fis-enriched/
      - name: Run BIVAS Comparison
        run: make validate-bivas
      - name: Upload BIVAS Validation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bivas-validation
          path: output/bivas-validation/
          retention-days: 30

