name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: uv sync --all-groups --frozen
        
      - name: Run Ruff Linter
        run: uvx ruff check fis/ tests/
        
      - name: Print Ruff Formatter Diff
        run: uvx ruff format --diff fis/ tests/

      - name: Run Ruff Formatter Check
        run: uvx ruff format --check fis/ tests/
        
      - name: Run Integrated Dropins Schematization (subset)
        run: uv run python -m fis.cli dropins schematize --export-dir tests/data/fis-export --disk-dir tests/data/disk-export --output-dir output/dropins-schematization

      - name: Run Pytest
        run: uv run pytest tests/
